<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — CreatorFlow</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-XXXXXXXXXX');</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-logo">Creator<span>Flow</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"   class="nav-link"><i data-lucide="layout-dashboard" class="nav-icon"></i> <span data-i18n="nav_dashboard">Dashboard</span></a>
      <a href="influencers.html" class="nav-link"><i data-lucide="users" class="nav-icon"></i> <span data-i18n="nav_influencers">Influencers</span></a>
      <a href="analytics.html"   class="nav-link"><i data-lucide="bar-chart-2" class="nav-icon"></i> <span data-i18n="nav_analytics">Analytics</span></a>
      <a href="templates.html"   class="nav-link"><i data-lucide="mail" class="nav-icon"></i> <span data-i18n="nav_templates">Templates</span></a>
      <a href="account.html"     class="nav-link active"><i data-lucide="user" class="nav-icon"></i> <span data-i18n="nav_account">Account</span></a>
    </nav>
    <div class="sidebar-bottom">
      <button class="sidebar-upgrade-btn" id="upgrade-btn" data-i18n="btn_upgrade" onclick="openUpgradeModal()" style="display:none">Улучшить</button>
      <div class="user-info">
        <span class="user-email" id="user-email">—</span>
        <button class="logout-btn" onclick="auth.signOut().then(()=>{localStorage.removeItem('cfUid');location.href='index.html'})">Out</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 data-i18n="nav_account">Account</h1>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
      </div>
      <button class="btn btn-ghost btn-sm" id="demo-toggle-btn" onclick="handleDemoBtn()" style="color:var(--muted)"><i data-lucide="flask-conical" class="btn-icon-sm"></i> <span data-i18n="acc_demo_data">Demo Data</span></button>
    </div>
    <div class="page-content">

      <div class="account-grid">

        <!-- Plan card -->
        <div class="card account-card">
          <div class="account-card-header">
            <span class="account-card-title" data-i18n="acc_sub_title">Subscription</span>
            <span class="plan-chip" id="plan-chip">—</span>
          </div>
          <div class="account-plan-info" id="plan-info">
            <div class="account-loading" data-i18n="acc_loading">Loading...</div>
          </div>
          <div class="account-card-actions" id="plan-actions"></div>
        </div>

        <!-- Profile card -->
        <div class="card account-card">
          <div class="account-card-header">
            <span class="account-card-title" data-i18n="acc_profile_title">Profile</span>
          </div>
          <div class="account-profile">
            <div class="account-avatar" id="avatar-initials">—</div>
            <div>
              <div class="account-email-big" id="profile-email">—</div>
              <div class="account-since" id="profile-since">—</div>
            </div>
          </div>
        </div>

      </div>

      <!-- Plan features -->
      <div class="card" id="features-card" style="display:none">
        <div class="card-header">
          <span class="card-title" data-i18n="acc_features_title">What's included in your plan</span>
        </div>
        <div class="account-features" id="plan-features"></div>
      </div>

      <!-- Security -->
      <div class="card">
        <div class="card-header">
          <span class="card-title" data-i18n="acc_security_title">Security</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;padding:4px 0">
          <div>
            <div style="font-size:14px;font-weight:500;margin-bottom:4px" data-i18n="acc_change_pass">Change password</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <input type="password" id="new-pass" data-i18n-ph="acc_pass_ph" placeholder="New password (min 6 chars)" style="flex:1;min-width:200px">
              <button class="btn btn-ghost btn-sm" onclick="changePassword()" data-i18n="acc_save_pass">Save</button>
            </div>
            <p class="auth-error" id="pass-msg" style="display:none;margin-top:6px"></p>
          </div>
        </div>
      </div>

      <!-- Danger zone -->
      <div class="card" style="border-color:#fee2e2">
        <div class="card-header">
          <span class="card-title" style="color:#dc2626" data-i18n="acc_danger_title">Danger zone</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
          <div>
            <div style="font-size:14px;font-weight:500" data-i18n="acc_delete_title">Delete account</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px" data-i18n="acc_delete_sub">All your data will be permanently deleted.</div>
          </div>
          <button class="btn btn-sm" style="border-color:#dc2626;color:#dc2626" onclick="confirmDeleteAccount()" data-i18n="acc_delete_btn">Delete my account</button>
        </div>
      </div>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="i18n.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="trial.js"></script>
<script>
function getPlanFeatures(plan) {
  const f = {
    free: [
      { ok: true,  en: '1 campaign',                        ru: '1 кампания' },
      { ok: true,  en: 'Up to 10 influencers',              ru: 'До 10 инфлюенсеров' },
      { ok: true,  en: 'Basic deal pipeline',               ru: 'Базовая воронка сделок' },
      { ok: false, en: 'Analytics (Pro+)',                   ru: 'Аналитика (Pro+)' },
      { ok: false, en: 'CSV export (Pro+)',                  ru: 'Экспорт CSV (Pro+)' },
      { ok: false, en: 'Unlimited outreach templates (Pro+)',ru: 'Безлимитные шаблоны (Pro+)' },
    ],
    pro: [
      { ok: true, en: 'Up to 10 campaigns',              ru: 'До 10 кампаний' },
      { ok: true, en: 'Up to 100 influencers',           ru: 'До 100 инфлюенсеров' },
      { ok: true, en: 'Full analytics + CSV export',     ru: 'Полная аналитика + CSV' },
      { ok: true, en: 'Unlimited outreach templates',    ru: 'Безлимитные шаблоны' },
      { ok: true, en: 'Drag & drop deals',               ru: 'Drag & drop сделок' },
      { ok: true, en: 'Priority support',                ru: 'Приоритетная поддержка' },
    ],
    agency: [
      { ok: true, en: 'Unlimited campaigns',             ru: 'Безлимитные кампании' },
      { ok: true, en: 'Unlimited influencers',           ru: 'Безлимитные инфлюенсеры' },
      { ok: true, en: 'Full analytics + CSV export',     ru: 'Полная аналитика + CSV' },
      { ok: true, en: 'Up to 5 team members',            ru: 'До 5 участников команды' },
      { ok: true, en: 'White-label reports',             ru: 'White-label отчёты' },
      { ok: true, en: 'Dedicated support',               ru: 'Персональная поддержка' },
    ],
  };
  return (f[plan] || f.free).map(item => ({
    text: (currentLang === 'ru' ? item.ru : item.en),
    ok: item.ok
  }));
}

if (!localStorage.getItem('cfUid')) location.href = 'index.html';

auth.onAuthStateChanged(user => {
  if (!user) { localStorage.removeItem('cfUid'); return location.href = 'index.html'; }
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('profile-email').textContent = user.email;
  const initials = user.email.slice(0, 2).toUpperCase();
  document.getElementById('avatar-initials').textContent = initials;
  const demoBtn = document.getElementById('demo-toggle-btn');
  if (demoBtn) { demoBtn.innerHTML = isDemoMode() ? `<i data-lucide="x-circle" class="btn-icon-sm"></i> ${t('acc_exit_demo')}` : `<i data-lucide="flask-conical" class="btn-icon-sm"></i> ${t('acc_demo_data')}`; if(window.lucide) lucide.createIcons(); }

  db.collection('users').doc(user.uid).onSnapshot(snap => {
    const data = snap.data() || {};
    const plan = data.plan || 'free';

    const planLabel = document.getElementById('plan-label');
    if (planLabel) planLabel.textContent = plan.charAt(0).toUpperCase() + plan.slice(1);

    const trial = getTrialStatus(data);

    // Plan chip
    const chip = document.getElementById('plan-chip');
    chip.textContent = plan === 'free' ? (trial.trial ? 'Trial' : 'Free') : plan.charAt(0).toUpperCase() + plan.slice(1);
    chip.className = 'plan-chip plan-chip-' + (plan === 'free' ? 'free' : 'paid');

    // Plan info
    const info = document.getElementById('plan-info');
    if (plan === 'free') {
      if (trial.trial) {
        const color = trial.daysLeft <= 3 ? '#dc2626' : '#ca8a04';
        info.innerHTML = `<div class="account-trial-info" style="border-color:${color}20;background:${color}08">
          <div class="account-trial-days" style="color:${color}">${t('acc_days_left', {n: trial.daysLeft})}</div>
          <div class="account-trial-sub">${t('acc_trial_soon')}</div>
        </div>`;
      } else {
        info.innerHTML = `<div class="account-trial-info" style="border-color:#dc262620;background:#dc262608"><div class="account-trial-days" style="color:#dc2626">${t('acc_trial_expired')}</div><div class="account-trial-sub">${t('acc_trial_exp_sub')}</div></div>`;
      }
    } else {
      info.innerHTML = `<div class="account-active-plan"><div class="account-active-dot"></div><span>${t('acc_active')}</span></div>`;
    }

    // Actions
    const actions = document.getElementById('plan-actions');
    if (plan === 'free') {
      actions.innerHTML = `
        <button class="btn btn-primary" onclick="openUpgradeModal()">${t('acc_upgrade_btn')}</button>`;
    } else {
      actions.innerHTML = `<button class="btn btn-secondary" onclick="openPortal()">${t('acc_manage_btn')}</button>`;
    }

    // Features
    const featCard = document.getElementById('features-card');
    featCard.style.display = 'block';
    const features = getPlanFeatures(plan);
    document.getElementById('plan-features').innerHTML = features.map(f =>
      `<div class="account-feature-item ${f.ok ? '' : 'locked'}">${f.ok ? '✓' : '✗'} ${f.text}</div>`
    ).join('');

    // Since
    if (data.createdAt) {
      const d = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
      document.getElementById('profile-since').textContent = t('acc_since') + ' ' + d.toLocaleDateString(currentLang === 'ru' ? 'ru-RU' : 'en-US', { month: 'long', year: 'numeric' });
    }

    const upgradeBtn = document.getElementById('upgrade-btn');
    if (upgradeBtn) upgradeBtn.style.display = plan === 'free' ? '' : 'none';
  });
});

async function openPortal() {
  const user = auth.currentUser;
  if (!user) return;
  const btn = document.querySelector('[onclick="openPortal()"]');
  if (btn) { btn.disabled = true; btn.textContent = t('acc_loading'); }
  try {
    const res = await fetch('/api/customer-portal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: user.uid })
    });
    const { url, error } = await res.json();
    if (url) window.location.href = url;
    else alert(error || 'Something went wrong');
  } catch (e) {
    alert('Something went wrong');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = t('acc_manage_btn'); }
  }
}

function handleDemoBtn() {
  if (isDemoMode()) { cleanAndExitDemo(); } else { location.href = 'dashboard.html?demo=1'; }
}

async function changePassword() {
  const pass = document.getElementById('new-pass').value.trim();
  const msg  = document.getElementById('pass-msg');
  msg.style.display = 'none';
  if (pass.length < 6) { msg.textContent = t('err_weak_pass'); msg.style.display = 'block'; return; }
  try {
    await auth.currentUser.updatePassword(pass);
    msg.style.color = 'var(--green)';
    msg.textContent = t('acc_pass_saved');
    msg.style.display = 'block';
    document.getElementById('new-pass').value = '';
  } catch(e) {
    msg.style.color = 'var(--red)';
    msg.textContent = e.code === 'auth/requires-recent-login' ? t('acc_relogin') : t('err_generic');
    msg.style.display = 'block';
  }
}

function confirmDeleteAccount() {
  openDemoConfirm(t('acc_delete_title'), t('acc_delete_confirm'), deleteAccount);
}

async function deleteAccount() {
  const user = auth.currentUser;
  if (!user) return;
  try {
    const uid = user.uid;
    await db.collection('users').doc(uid).delete();
    await user.delete();
    localStorage.removeItem('cfUid');
    location.href = 'index.html';
  } catch(e) {
    toast(e.code === 'auth/requires-recent-login' ? t('acc_relogin') : t('err_generic'), 'error');
  }
}
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" onload="lucide.createIcons()"></script>
</body>
</html>
